# ── Paper Broker (Simulator) ───────────────────────────────
# Configurable — set to realistic defaults matching Saxo (primary broker).
paper:
  default:
    commission_pct: 0.001       # 0.1% — matches Saxo Classic
    commission_min: 0.0         # No minimum in simulation
    commission_max: 0.0
    spread_pct: 0.0005          # 0.05% simulated spread
    currency: USD

# ── Symbol → Exchange Mapping ───────────────────────────────
# Maps yfinance symbol suffixes to exchange categories.
# Used to auto-select the correct fee schedule.
exchange_mapping:
  # No suffix → US stocks (default)
  "": us_stocks
  # Futures
  "=F": futures
  # Nordic
  ".CO": dk_stocks
  ".ST": se_stocks
  ".OL": no_stocks
  ".HE": fi_stocks
  # EU
  ".DE": eu_stocks        # XETRA (Germany)
  ".PA": eu_stocks        # Euronext Paris
  ".AS": eu_stocks        # Euronext Amsterdam
  ".MC": eu_stocks        # BME (Spain)
  ".MI": eu_stocks        # Borsa Italiana
  # Switzerland
  ".SW": swiss_stocks
  # UK
  ".L": uk_stocks
  # Asia
  ".HK": hk_stocks
  ".T": jp_stocks
  # Oceania
  ".AX": au_stocks
  ".NZ": nz_stocks
  # India
  ".NS": in_stocks
  # Crypto
  "-USD": crypto
  # ETFs (US-listed, no suffix) — handled by ETF symbol list check
  # VIX index
  "^": us_stocks
