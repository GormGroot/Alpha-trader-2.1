# ============================================================
# Trading Fees Configuration — Per Broker & Exchange
# ============================================================
# Realistic fee schedules for all supported brokers and exchanges.
# Fees are applied automatically based on symbol suffix → exchange mapping.
#
# Structure per broker:
#   commission_pct   : Percentage of trade value (0.001 = 0.1%)
#   commission_min   : Minimum commission per order in local currency
#   commission_max   : Maximum commission per order (0 = no max)
#   spread_pct       : Simulated spread (bid-ask) cost
#   currency         : Fee currency (for display/tax purposes)
#   platform_fee     : Fixed monthly platform fee (informational)

# ── Alpaca ──────────────────────────────────────────────────
# Commission-free for US stocks/ETFs. Crypto has spread.
alpaca:
  us_stocks:
    commission_pct: 0.0
    commission_min: 0.0
    commission_max: 0.0
    spread_pct: 0.0003          # ~3 bps market impact
    currency: USD
  us_etfs:
    commission_pct: 0.0
    commission_min: 0.0
    commission_max: 0.0
    spread_pct: 0.0002
    currency: USD
  crypto:
    commission_pct: 0.0015      # 0.15% taker fee
    commission_min: 0.0
    commission_max: 0.0
    spread_pct: 0.001
    currency: USD

# ── Interactive Brokers (IBKR) ──────────────────────────────
# Tiered pricing. Rates shown are typical retail tiered rates.
ibkr:
  us_stocks:
    commission_pct: 0.00035     # $0.0035/share → ~0.035% on $10 stock
    commission_min: 0.35        # USD 0.35 minimum
    commission_max: 0.005       # 0.5% of trade value max
    per_share: 0.0035           # Per-share pricing (used instead of pct)
    spread_pct: 0.0002
    currency: USD
  us_etfs:
    commission_pct: 0.00035
    commission_min: 0.35
    commission_max: 0.005
    per_share: 0.0035
    spread_pct: 0.0001
